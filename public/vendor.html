<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>COR Fleet — Tank Levels</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; }

/* ── Top bar ─────────────────────────────────────────────────────────── */
.top-bar {
  background: #0a1628;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #324a5f;
  position: sticky;
  top: 0;
  z-index: 100;
}
.top-bar h1 { font-size: 18px; font-weight: bold; letter-spacing: 1px; color: #03a9f4; }
.top-bar-sub { font-size: 11px; color: #7a9bbf; margin-top: 2px; }
.top-right { display: flex; align-items: center; gap: 14px; }
#ts { font-size: 12px; color: #b0b0b0; }
#auto-lbl { font-size: 12px; color: #b0b0b0; }
#refresh-btn {
  background: #0f3460; color: #fff; border: 1px solid #03a9f4;
  padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
}
#refresh-btn:hover { background: #1f3b73; }
#refresh-btn:disabled { opacity: 0.5; cursor: default; }

/* ── Summary bar ─────────────────────────────────────────────────────── */
.summary {
  display: flex; gap: 10px; padding: 14px 20px; flex-wrap: wrap;
  background: #16213e; border-bottom: 1px solid #324a5f;
}
.sum-card { background: #0f3460; border-radius: 8px; padding: 10px 18px; text-align: center; min-width: 110px; }
.sum-val { font-size: 22px; font-weight: bold; color: #fff; }
.sum-lbl { font-size: 11px; color: #b0b0b0; margin-top: 2px; }

/* ── Copy bar ────────────────────────────────────────────────────────── */
.copy-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 20px;
  background: #13172a;
  border-bottom: 1px solid #324a5f;
}
.copy-btn {
  background: #0f3460; color: #b0d0f0;
  border: 1px solid #324a5f;
  padding: 5px 12px; border-radius: 6px;
  font-size: 12px; cursor: pointer;
  transition: all 0.2s;
}
.copy-btn:hover { background: #1f3b73; border-color: #03a9f4; color: #fff; }
.copy-confirm {
  font-size: 12px; color: #47C13C;
  opacity: 0; transition: opacity 0.3s;
}
.copy-confirm.show { opacity: 1; }

/* ── Site grid ───────────────────────────────────────────────────────── */
.site-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
  gap: 14px;
  padding: 16px 20px;
}

.site-card { background: #16213e; border: 1px solid #324a5f; border-radius: 10px; overflow: hidden; }
.site-hdr {
  background: #0d2d58; padding: 10px 14px;
  display: flex; justify-content: space-between; align-items: flex-start;
  border-bottom: 1px solid #324a5f;
}
.site-name { font-size: 13px; font-weight: bold; color: #fff; }
.site-addr { font-size: 11px; color: #b0b0b0; margin-top: 2px; }
.badge { font-size: 11px; padding: 3px 9px; border-radius: 12px; font-weight: bold; white-space: nowrap; flex-shrink: 0; margin-left: 8px; }
.b-ok      { background: #1b5e20; color: #a5d6a7; }
.b-loading { background: #0d47a1; color: #90caf9; }
.b-error   { background: #b71c1c; color: #ef9a9a; }
.b-low     { background: #7e3d00; color: #ffcc80; }

/* ── Tank rows ───────────────────────────────────────────────────────── */
.tank-list { padding: 6px 10px; }
.tank-row {
  display: grid;
  grid-template-columns: 110px 1fr 80px;
  gap: 8px; align-items: center;
  padding: 7px 4px;
  border-bottom: 1px solid #253a4f;
}
.tank-row:last-child { border-bottom: none; }
.t-name { font-size: 12px; font-weight: bold; color: #03a9f4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.t-type { font-size: 11px; color: #b0b0b0; }

/* LOW badge on tank */
.low-badge {
  display: inline-block; font-size: 9px; font-weight: bold;
  background: #7e3d00; color: #ffcc80;
  border: 1px solid #b35a00; border-radius: 3px;
  padding: 1px 5px; margin-left: 5px;
  vertical-align: middle; letter-spacing: 0.5px;
}
.drain-badge {
  display: inline-block; font-size: 9px; font-weight: bold;
  background: #b71c1c; color: #ef9a9a;
  border: 1px solid #c62828; border-radius: 3px;
  padding: 1px 5px; margin-left: 5px;
  vertical-align: middle; letter-spacing: 0.5px;
}
.waste-tag {
  display: inline-block; font-size: 9px; font-weight: bold;
  background: #2a1a00; color: #ff9800;
  border: 1px solid #7e3d00; border-radius: 3px;
  padding: 1px 4px; margin-left: 4px;
  vertical-align: middle; letter-spacing: 0.5px;
}

.bar-wrap { background: #253a4f; border-radius: 6px; height: 12px; overflow: hidden; border: 1px solid #324a5f; }
.bar-fill { height: 100%; border-radius: 6px; transition: width 0.6s ease; }

.t-right { text-align: right; white-space: nowrap; min-width: 80px; }
.t-vol { font-size: 12px; font-weight: bold; color: #fff; }
.t-pct { font-size: 11px; color: #c0c0c0; }

.t-detail {
  font-size: 11px; margin-top: 3px;
  display: flex; align-items: center; gap: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.t-lbl {
  font-size: 9px; font-weight: bold;
  text-transform: uppercase; letter-spacing: 0.5px;
  color: #03a9f4; flex-shrink: 0;
}
.t-val { font-weight: bold; color: #e0e0e0; }
.t-sep { color: #4a6a8a; margin: 0 3px; flex-shrink: 0; }
.t-in  { font-size: 10px; color: #8aabcc; white-space: nowrap; flex-shrink: 0; }

.alarm-row { background: rgba(244,67,54,0.08); }
.warn-row  { background: rgba(255,152,0,0.08); }
.waste-oil-row { border-top: 1px dashed #324a5f; margin-top: 4px; }

.placeholder { padding: 18px; text-align: center; font-size: 12px; color: #b0b0b0; }
.err-msg { padding: 10px 14px; font-size: 12px; color: #ef9a9a; background: #2d1515; }
.pulse { animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── Footer ──────────────────────────────────────────────────────────── */
.page-footer {
  text-align: center;
  padding: 16px;
  font-size: 11px;
  color: #4a6a8a;
  border-top: 1px solid #1e2a3a;
  margin-top: 8px;
}
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <h1>&#9874; City of Raleigh Fleet — Tank Levels</h1>
    <div class="top-bar-sub">Read-only vendor view &nbsp;&middot;&nbsp; All 7 sites</div>
  </div>
  <div class="top-right">
    <span id="auto-lbl"></span>
    <span id="ts">—</span>
    <button id="refresh-btn">&#8635; Refresh</button>
  </div>
</div>

<div class="summary">
  <div class="sum-card"><div class="sum-val" id="s-sites">7</div><div class="sum-lbl">Total Sites</div></div>
  <div class="sum-card"><div class="sum-val" id="s-online">—</div><div class="sum-lbl">Online</div></div>
  <div class="sum-card"><div class="sum-val" id="s-tanks">—</div><div class="sum-lbl">Total Tanks</div></div>
  <div class="sum-card"><div class="sum-val" id="s-low">—</div><div class="sum-lbl">Low (&lt;25%)</div></div>
  <div class="sum-card"><div class="sum-val" id="s-total-vol">—</div><div class="sum-lbl">Total Gallons</div></div>
</div>

<div class="copy-bar">
  <button id="copy-levels-btn" class="copy-btn">&#128203; Copy Levels</button>
  <span id="copy-confirm" class="copy-confirm">&#10003; Copied!</span>
</div>

<div class="site-grid" id="site-grid"></div>

<div class="page-footer">
  City of Raleigh Fleet Management &nbsp;&middot;&nbsp; Data refreshes automatically every 5 minutes
</div>

<script>

const PROXY_URL = "/api/tanks";
const REFRESH_SECONDS = 300;
let refreshTimer = null;
let countTimer   = null;
let allSiteResults = [];

// ── Site / probe config (mirrors index.html — no IPs exposed in UI) ────────

const SITES = [
  { name: "Central Operations FMO",        addr: "2540 Westinghouse Blvd", url: "http://63.46.75.214:10001" },
  { name: "Northeast Remote Ops FMO",      addr: "7702 Burwell St",        url: "http://166.146.80.90:10001" },
  { name: "Heavy Equipment Shop FMO",      addr: "4120 New Bern Ave",      url: "http://63.46.75.226:10001" },
  { name: "Public Utilities Field Ops RW", addr: "3304 Lake Woodard Dr",   url: "http://63.46.75.230:10001" },
  { name: "Wilders Grove SWS",             addr: "610 Beacon Lake Dr",     url: "http://63.46.75.218:10001" },
  { name: "Marsh Creek PRCR",              addr: "4225 Daly Rd",           url: "http://63.46.75.228:10001" },
  { name: "Neuse River NRRF RW",           addr: "8500 Battle Bridge Rd",  url: "http://63.46.75.227:10001" },
];

const PROBE_LENGTHS = {
  "http://63.46.75.214:10001|1": 120, "http://63.46.75.214:10001|2": 120,
  "http://63.46.75.214:10001|3": 120, "http://63.46.75.214:10001|4": 120,
  "http://63.46.75.214:10001|5": 120, "http://63.46.75.214:10001|6": 82,
  "http://166.146.80.90:10001|1": 96, "http://166.146.80.90:10001|2": 96,
  "http://166.146.80.90:10001|3": 96, "http://166.146.80.90:10001|4": 96,
  "http://166.146.80.90:10001|5": 82,
  "http://63.46.75.226:10001|1": 96,  "http://63.46.75.226:10001|2": 96,
  "http://63.46.75.226:10001|3": 96,  "http://63.46.75.226:10001|4": 96,
  "http://63.46.75.226:10001|5": 96,  "http://63.46.75.226:10001|6": 96,
  "http://63.46.75.226:10001|7": 48,
  "http://63.46.75.230:10001|1": 124, "http://63.46.75.230:10001|2": 124,
  "http://63.46.75.230:10001|3": 124,
  "http://63.46.75.218:10001|1": 132, "http://63.46.75.218:10001|2": 82,
  "http://63.46.75.228:10001|1": 78,  "http://63.46.75.228:10001|2": 74,
  "http://63.46.75.228:10001|3": 74,
  "http://63.46.75.227:10001|1": 96,
};

const TANK_OVERRIDES = {
  "http://63.46.75.226:10001|2": { isWasteOil: true, highAlertPct: 80, sortLast: true }
};

const PRODUCT_NAME_MAP = {
  "On-Road Diesel": "On-road Diesel",
  "on-road diesel": "On-road Diesel",
  "ON-ROAD DIESEL": "On-road Diesel",
};

function normalizeFuelType(name) { return PRODUCT_NAME_MAP[name] || name; }
function getProbeLength(siteUrl, tankId) { return PROBE_LENGTHS[siteUrl + "|" + tankId] || null; }
function getTankOverride(siteUrl, tankId) { return TANK_OVERRIDES[siteUrl + "|" + tankId] || null; }

// ── Color helpers ──────────────────────────────────────────────────────────

function barColor(pct) {
  if (pct >= 50) return "#47C13C";
  if (pct >= 25) return "#F79B0E";
  return "#E9050C";
}

function wasteOilBarColor(pct, alertPct) {
  if (pct >= alertPct)        return "#f44336";
  if (pct >= alertPct * 0.75) return "#F79B0E";
  return "#47C13C";
}

// ── Inventory / fuel type parser (same logic as index.html) ───────────────

function parseFuelTypes(html) {
  const fuelMap = {};
  try {
    const match = html.match(/const tankData\s*=\s*(\[[\s\S]*?\])\s*;/);
    if (match) {
      const arr = JSON.parse(match[1]);
      if (arr.length > 0 && arr[0].fuelType) {
        arr.forEach(t => { if (t.id != null && t.fuelType) fuelMap[t.id] = t.fuelType; });
        if (Object.keys(fuelMap).length > 0) return fuelMap;
      }
    }
  } catch (e) {}
  const re = /<span[^>]+class=["']fuel-type["'][^>]*>([^<]+)<\/span>/g;
  let m, idx = 1;
  while ((m = re.exec(html)) !== null) fuelMap[idx++] = m[1].trim();
  return fuelMap;
}

function parseProxyAlarms(data) {
  if (!Array.isArray(data)) return [];
  return data.map(item => ({
    description: item.alarmdesc || item.catdesc || "Alarm",
    severity: ((item.catdesc || "").toLowerCase().includes("warn")) ? "warning" : "alarm",
    tankNum: String(item.itemnum || ""),
  }));
}

// ── Inches string ──────────────────────────────────────────────────────────

function inchesStr(t) {
  if (!t.grossHeight) return "";
  const probe = t.probeLength;
  if (probe) {
    return "<span class='t-sep'>|</span><span class='t-lbl'>IN</span>"
      + "<span class='t-in'>" + t.grossHeight + "\" / " + probe + "\"</span>";
  }
  return "<span class='t-sep'>|</span><span class='t-lbl'>IN</span>"
    + "<span class='t-in'>" + t.grossHeight + "\"</span>";
}

// ── Tank row builder (vendor — no flags, no tooltips, no alarm details) ────

function buildTankRow(t) {
  const ov = t.override;

  // Waste oil tank
  if (ov && ov.isWasteOil) {
    const col    = wasteOilBarColor(t.pct, ov.highAlertPct);
    const isHigh = t.pct >= ov.highAlertPct;
    const pctSafe = Math.min(t.pct, 100);
    return "<div class='tank-row waste-oil-row" + (isHigh ? " alarm-row" : "") + "'>"
      + "<div>"
      +   "<div class='t-name'>" + t.fuelType + " <span class='waste-tag'>WASTE</span>"
      +   (isHigh ? "<span class='drain-badge'>DRAIN NEEDED</span>" : "")
      +   "</div>"
      +   "<div class='t-type'>Tank " + t.id + "</div>"
      + "</div>"
      + "<div>"
      +   "<div class='bar-wrap'><div class='bar-fill' style='width:" + pctSafe + "%;background:" + col + "'></div></div>"
      +   "<div class='t-detail'>"
      +     "<span class='t-lbl'>Ullage</span><span class='t-val'>" + t.ullage.toLocaleString() + " G</span>"
      +     inchesStr(t)
      +   "</div>"
      + "</div>"
      + "<div class='t-right'>"
      +   "<div class='t-vol'>" + t.vol.toLocaleString() + " G</div>"
      +   "<div class='t-pct' style='color:" + col + "'>" + t.pct + "%</div>"
      + "</div>"
      + "</div>";
  }

  // Normal fuel tank
  const col     = t.fuelColor || barColor(t.pct);
  const isLow   = t.pct < 25;
  const pctSafe = Math.min(t.pct, 100);

  return "<div class='tank-row" + (isLow ? " warn-row" : "") + "'>"
    + "<div>"
    +   "<div class='t-name'>" + t.fuelType
    +   (isLow ? "<span class='low-badge'>LOW</span>" : "")
    +   "</div>"
    +   "<div class='t-type'>Tank " + t.id + "</div>"
    + "</div>"
    + "<div>"
    +   "<div class='bar-wrap'><div class='bar-fill' style='width:" + pctSafe + "%;background:" + col + "'></div></div>"
    +   "<div class='t-detail'>"
    +     "<span class='t-lbl'>Ullage</span><span class='t-val'>" + t.ullage.toLocaleString() + " G</span>"
    +     inchesStr(t)
    +   "</div>"
    + "</div>"
    + "<div class='t-right'>"
    +   "<div class='t-vol'>" + t.vol.toLocaleString() + " G</div>"
    +   "<div class='t-pct' style='color:" + col + "'>" + t.pct + "%</div>"
    + "</div>"
    + "</div>";
}

// ── Card builder ───────────────────────────────────────────────────────────

function buildCardHTML(site) {
  const hasError = !!site.error;
  const hasData  = !hasError && site.tanks.length > 0;
  const hasLow   = (site.tanks || []).some(t =>
    !t.override?.isWasteOil && t.pct < 25
  );
  const wasteHigh = (site.tanks || []).some(t =>
    t.override?.isWasteOil && t.pct >= t.override.highAlertPct
  );

  let badgeClass, badgeText;
  if (hasError) {
    badgeClass = "b-error"; badgeText = "Offline";
  } else if (hasLow || wasteHigh) {
    badgeClass = "b-low"; badgeText = "Low Fuel";
  } else {
    badgeClass = "b-ok"; badgeText = "Online (" + site.tanks.length + " tanks)";
  }

  let html = "<div class='site-hdr'>"
    + "<div>"
    +   "<div class='site-name'>" + site.name + "</div>"
    +   "<div class='site-addr'>" + site.addr + "</div>"
    + "</div>"
    + "<span class='badge " + badgeClass + "'>" + badgeText + "</span>"
    + "</div>";

  if (hasError) {
    html += "<div class='err-msg'>&#9888; " + site.error + "</div>";
  } else if (hasData) {
    html += "<div class='tank-list'>";
    site.tanks.forEach(t => { html += buildTankRow(t); });
    html += "</div>";
  } else {
    html += "<div class='placeholder'>No tank data received</div>";
  }
  return html;
}

// ── Copy Levels ────────────────────────────────────────────────────────────

function copyTimestamp() {
  const now = new Date();
  return now.toLocaleDateString("en-US", { month: "2-digit", day: "2-digit", year: "numeric" })
    + " " + now.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });
}

function buildCopyText() {
  let text = "COR FLEET ATG TANK LEVELS \u2014 " + copyTimestamp() + "\n\n";
  allSiteResults.forEach(result => {
    if (!result || result.error) return;
    text += result.name + ", " + result.addr + "\n";
    (result.tanks || []).forEach(t => {
      const label    = ("Tank " + t.id + " - " + t.fuelType).padEnd(30);
      const inches   = t.grossHeight ? t.grossHeight + "\"" : "—";
      const probe    = t.probeLength ? " / " + t.probeLength + "\"" : "";
      const inStr    = (inches + probe).padEnd(12);
      const volStr   = (t.vol.toLocaleString() + " G").padEnd(10);
      const ullStr   = "Ullage: " + t.ullage.toLocaleString() + " G";
      const lowFlag  = (!t.override?.isWasteOil && t.pct < 25) ? " [LOW]" : "";
      const drainflag = (t.override?.isWasteOil && t.pct >= t.override.highAlertPct) ? " [DRAIN NEEDED]" : "";
      text += "  " + label + inStr + " | " + volStr + " | " + ullStr + lowFlag + drainflag + "\n";
    });
    text += "\n";
  });
  return text.trim();
}

document.getElementById("copy-levels-btn").addEventListener("click", function() {
  const text    = buildCopyText();
  const confirm = document.getElementById("copy-confirm");
  navigator.clipboard.writeText(text).then(() => {
    confirm.classList.add("show");
    setTimeout(() => confirm.classList.remove("show"), 2500);
  });
});

// ── Countdown ─────────────────────────────────────────────────────────────

function startAutoRefresh() {
  clearInterval(refreshTimer);
  clearInterval(countTimer);
  let countdown = REFRESH_SECONDS;
  updateCountdown(countdown);
  countTimer    = setInterval(() => {
    countdown--;
    updateCountdown(countdown);
    if (countdown <= 0) clearInterval(countTimer);
  }, 1000);
  refreshTimer = setInterval(fetchAll, REFRESH_SECONDS * 1000);
}

function updateCountdown(s) {
  const el = document.getElementById("auto-lbl");
  if (!el) return;
  if (s >= 60) {
    const m = Math.floor(s / 60), sec = s % 60;
    el.textContent = "Refresh in " + m + "m" + (sec > 0 ? " " + sec + "s" : "");
  } else {
    el.textContent = "Refresh in " + s + "s";
  }
}

// ── Main fetch ─────────────────────────────────────────────────────────────

async function fetchAll() {
  clearInterval(refreshTimer);
  clearInterval(countTimer);
  const btn = document.getElementById("refresh-btn");
  btn.disabled = true;
  btn.textContent = "Loading\u2026";

  allSiteResults = new Array(SITES.length);
  const grid = document.getElementById("site-grid");
  grid.innerHTML = "";

  SITES.forEach((s, i) => {
    const card = document.createElement("div");
    card.className = "site-card";
    card.id = "card-" + i;
    card.innerHTML = "<div class='site-hdr'>"
      + "<div><div class='site-name'>" + s.name + "</div><div class='site-addr'>" + s.addr + "</div></div>"
      + "<span class='badge b-loading pulse'>Loading\u2026</span>"
      + "</div><div class='placeholder'>Fetching data\u2026</div>";
    grid.appendChild(card);
  });

  let proxyResults;
  try {
    const ctrl = new AbortController();
    const tid  = setTimeout(() => ctrl.abort(), 30000);
    const resp = await fetch(PROXY_URL, { cache: "no-store", signal: ctrl.signal });
    clearTimeout(tid);
    if (!resp.ok) throw new Error("Proxy error " + resp.status);
    proxyResults = await resp.json();
  } catch(e) {
    SITES.forEach((s, i) => {
      allSiteResults[i] = { name: s.name, addr: s.addr, url: s.url, tanks: [], error: "Proxy unreachable: " + e.message };
      const card = document.getElementById("card-" + i);
      if (card) card.innerHTML = buildCardHTML(allSiteResults[i]);
    });
    btn.disabled = false;
    btn.textContent = "\u27f3 Refresh";
    startAutoRefresh();
    updateSummary();
    return;
  }

  proxyResults.forEach((proxyResult, i) => {
    const result = { name: proxyResult.name, addr: proxyResult.addr, url: proxyResult.url, tanks: [], error: proxyResult.error || null };

    if (!proxyResult.error && proxyResult.cgiData && proxyResult.cgiData.tankData) {
      const fuelMap  = proxyResult.invHtml ? parseFuelTypes(proxyResult.invHtml) : {};
      const volUnits = proxyResult.cgiData.volUnitsStr || "G";

      proxyResult.cgiData.tankData.forEach(t => {
        const cap      = t.capacity || 1;
        const gross    = t.grossVolume || 0;
        const override = getTankOverride(proxyResult.url, t.tankNum);
        const cap2     = (override && override.capacityCap) ? override.capacityCap : cap;
        const pctCapped = Math.min(Math.round((gross / cap2) * 1000) / 10, 100);
        const ullageCapped = Math.max(0, Math.round(cap2 * 0.9 - gross));

        result.tanks.push({
          id:          t.tankNum,
          fuelType:    normalizeFuelType(fuelMap[t.tankNum] || t.fuelType || "Tank " + t.tankNum),
          vol:         Math.round(t.productVolume || gross),
          pct:         pctCapped,
          ullage:      (override && override.capacityCap) ? ullageCapped : Math.round(t.adjustedUllage || 0),
          fuelColor:   t.fuelColor || barColor(pctCapped),
          grossHeight: t.grossHeight != null ? t.grossHeight.toFixed(2) : null,
          probeLength: getProbeLength(proxyResult.url, t.tankNum),
          override:    override,
          volUnits:    volUnits,
        });
      });

      result.tanks.sort((a, b) => {
        const aLast = a.override && a.override.sortLast ? 1 : 0;
        const bLast = b.override && b.override.sortLast ? 1 : 0;
        if (aLast !== bLast) return aLast - bLast;
        return a.id - b.id;
      });
    }

    allSiteResults[i] = result;
    const card = document.getElementById("card-" + i);
    if (card) card.innerHTML = buildCardHTML(result);
  });

  updateSummary();

  const now = new Date();
  document.getElementById("ts").textContent =
    now.toLocaleDateString("en-US", { month: "short", day: "numeric" }) + " " + now.toLocaleTimeString();
  btn.disabled = false;
  btn.textContent = "\u27f3 Refresh";
  startAutoRefresh();
}

function updateSummary() {
  let online = 0, tanks = 0, lowFuel = 0, totalVol = 0;
  allSiteResults.forEach(result => {
    if (!result || result.error) return;
    online++;
    (result.tanks || []).forEach(t => {
      tanks++;
      if (!t.override || !t.override.isWasteOil) {
        totalVol += t.vol;
        if (t.pct < 25) lowFuel++;
      }
    });
  });
  document.getElementById("s-online").textContent    = online || "\u2014";
  document.getElementById("s-online").style.color    = (online > 0 && online < SITES.length) ? "#f44336" : "#fff";
  document.getElementById("s-tanks").textContent     = tanks || "\u2014";
  document.getElementById("s-low").textContent       = lowFuel;
  document.getElementById("s-low").style.color       = lowFuel > 0 ? "#ff9800" : "#fff";
  document.getElementById("s-total-vol").textContent = totalVol > 0 ? totalVol.toLocaleString() : "\u2014";
}

document.getElementById("refresh-btn").addEventListener("click", fetchAll);

fetchAll();
</script>
</body>
</html>
